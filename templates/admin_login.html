<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | Prioribin</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at top right, var(--primary-light), transparent),
                radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.1), transparent);
            min-height: 100vh;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 0, 0, 0.05);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-xl);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto;
        }

        .form-floating>.form-control:focus~label,
        .form-floating>.form-control:not(:placeholder-shown)~label {
            color: var(--primary);
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center p-4">

    <div class="login-card p-5 text-center">
        <div class="icon-circle mb-4 shadow-sm">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h3 class="fw-bold text-dark mb-1">Admin Portal</h3>
        <p class="text-muted mb-4 small fw-medium">Prioribin Central Dashboard</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-danger text-start py-2 small mb-4 rounded border-0 bg-danger-light text-danger">
            <i class="bi bi-exclamation-circle-fill me-1"></i> {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/admin_login" method="POST" class="text-start">
            <div class="form-floating mb-3">
                <input type="text" name="username" id="usernameInput" class="form-control rounded-card"
                    placeholder="Username" required>
                <label for="usernameInput" class="text-muted">Username</label>
            </div>

            <div class="form-floating mb-4">
                <input type="password" name="password" id="passwordInput" class="form-control rounded-card"
                    placeholder="Password" required>
                <label for="passwordInput" class="text-muted">Password</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold shadow-soft">
                Access Dashboard <i class="bi bi-box-arrow-in-right ms-2"></i>
            </button>
        </form>

        <div class="mt-4 pt-4 border-top">
            <a href="/" class="text-muted text-decoration-none small fw-medium hover-primary">
                &larr; Return to Homepage
            </a>
        </div>
    </div>

</body>

</html>
