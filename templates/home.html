<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prioribin | Welcome</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, var(--bg-main) 0%, var(--primary-light) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 4rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow-xl);
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .btn-custom {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: var(--radius-md);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-admin {
            background-color: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
        }

        .btn-admin:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
            color: white;
        }

        .btn-collector {
            background-color: white;
            color: var(--dark);
            border: 2px solid #E2E8F0;
        }

        .btn-collector:hover {
            border-color: var(--success);
            color: var(--success);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.15);
        }
    </style>
</head>

<body>

    <div class="hero-card">
        <i class="bi bi-trash3-fill logo-icon"></i>
        <h1 class="fw-bold mb-3">Prioribin</h1>
        <p class="text-muted mb-5 fs-5">Smart Waste Management System</p>

        <div class="d-flex flex-column gap-3">
            <a href="/admin" class="btn btn-custom btn-admin">
                <i class="bi bi-shield-lock"></i> Go to Admin Dashboard
            </a>
            <a href="/collector_login" class="btn btn-custom btn-collector">
                <i class="bi bi-truck"></i> Login as Collector
            </a>
        </div>
    </div>

</body>

</html>
