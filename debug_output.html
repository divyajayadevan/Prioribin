<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Prioribin</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <style>
        .dashboard-header {
            background-color: var(--bg-card);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 1rem 2rem;
        }

        .map-container {
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stat-card {
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--bg-card);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .bg-indigo-light {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .bg-emerald-light {
            background-color: var(--success-light);
            color: var(--success);
        }

        .bg-rose-light {
            background-color: var(--danger-light);
            color: var(--danger);
        }

        .bin-card {
            border: 1px solid transparent;
        }

        .bin-progress {
            height: 8px;
            border-radius: 4px;
            background-color: #F1F5F9;
        }

        .bin-progress-bar {
            border-radius: 4px;
            transition: width 0.5s ease-in-out, background-color 0.3s;
        }

        /* Status theme classes */
        .theme-success {
            border-color: var(--success-light);
        }

        .theme-success .text-value {
            color: var(--success);
        }

        .theme-success .bar-fill {
            background-color: var(--success);
        }

        .theme-success-badge {
            background-color: var(--success-light);
            color: var(--success);
        }

        .theme-warning {
            border-color: var(--warning-light);
        }

        .theme-warning .text-value {
            color: var(--warning);
        }

        .theme-warning .bar-fill {
            background-color: var(--warning);
        }

        .theme-warning-badge {
            background-color: var(--warning-light);
            color: var(--warning);
        }

        .theme-danger {
            border-color: var(--danger-light);
        }

        .theme-danger .text-value {
            color: var(--danger);
        }

        .theme-danger .bar-fill {
            background-color: var(--danger);
        }

        .theme-danger-badge {
            background-color: var(--danger-light);
            color: var(--danger);
        }
    </style>
</head>

<body>

    <nav class="dashboard-header d-flex justify-content-between align-items-center mb-4 sticky-top">
        <a class="navbar-brand fw-bold text-dark fs-4 d-flex align-items-center gap-2" href="/">
            <i class="bi bi-trash3-fill text-primary"></i> Prioribin
        </a>
        <div class="d-flex gap-3 align-items-center">
            <span
                class="badge bg-primary-light text-primary rounded-pill px-3 py-2 border-0 shadow-sm d-flex align-items-center gap-2">
                <span class="spinner-grow spinner-grow-sm text-primary" role="status" aria-hidden="true"
                    style="width: 0.5rem; height: 0.5rem;"></span>
                Live System
            </span>
            <a href="/collector_login" class="btn btn-outline-secondary btn-sm rounded-pill px-3" target="_blank">
                <i class="bi bi-truck me-1"></i> Collector Portal
            </a>
            <a href="/" class="btn btn-light btn-sm rounded-pill px-3 border">Logout</a>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">

        <!-- Top Stats Row -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="stat-card shadow-sm">
                    <div class="stat-icon bg-indigo-light"><i class="bi bi-trash2"></i></div>
                    <div>
                        <h6 class="text-muted mb-1 text-uppercase fw-semibold"
                            style="letter-spacing: 0.05em; font-size: 0.75rem;">Initialized Bins</h6>
                        <h3 class="mb-0 fw-bold">2</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card shadow-sm">
                    <div class="stat-icon bg-rose-light"><i class="bi bi-exclamation-triangle"></i></div>
                    <div>
                        <h6 class="text-muted mb-1 text-uppercase fw-semibold"
                            style="letter-spacing: 0.05em; font-size: 0.75rem;">Critical Priority</h6>
                        <h3 class="mb-0 fw-bold" id="critical-count">-</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card shadow-sm">
                    <div class="stat-icon bg-emerald-light"><i class="bi bi-truck"></i></div>
                    <div>
                        <h6 class="text-muted mb-1 text-uppercase fw-semibold"
                            style="letter-spacing: 0.05em; font-size: 0.75rem;">Active Collectors</h6>
                        <h3 class="mb-0 fw-bold" id="collector-count">-</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">

            <!-- LEFT COLUMN: Map & Add Bin -->
            <div class="col-lg-4">
                <!-- Add Bin Card -->
                <div class="card shadow-sm mb-4 rounded-card border border-light">
                    <div class="card-header border-0 pt-4 pb-2 px-4 bg-white">
                        <h6 class="fw-bold mb-0 text-dark"><i class="bi bi-plus-circle-fill text-primary me-2"></i>
                            Deploy New Bin</h6>
                    </div>
                    <div class="card-body px-4 pb-4">
                        <form action="/add_bin" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-medium">Identifier</label>
                                <input type="text" name="bin_id" class="form-control bg-light border-0"
                                    placeholder="e.g. BIN-01" required>
                            </div>
                            <div class="row g-2 mb-4">
                                <div class="col">
                                    <label class="form-label text-muted small fw-medium">Latitude</label>
                                    <input type="number" step="any" name="lat" class="form-control bg-light border-0"
                                        placeholder="0.000" required>
                                </div>
                                <div class="col">
                                    <label class="form-label text-muted small fw-medium">Longitude</label>
                                    <input type="number" step="any" name="lon" class="form-control bg-light border-0"
                                        placeholder="0.000" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 rounded-pill shadow-sm py-2">Initialize
                                Sensor Unit</button>
                        </form>
                    </div>
                </div>

                <!-- Live Map Card -->
                <div class="map-container bg-white p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3 px-2">
                        <h6 class="fw-bold mb-0"><i class="bi bi-geo-alt-fill text-primary me-2"></i> Operating Area
                        </h6>
                        <div class="d-flex gap-2 small text-muted">
                            <span><span style="color:red">●</span> Bins</span>
                            <span><span style="color:blue">●</span> Trucks</span>
                        </div>
                    </div>
                    <!-- Added min-height to ensure map area renders reliably on all screens -->
                    <div id="map"
                        style="height: 350px; min-height: 350px; width: 100%; border-radius: var(--radius-sm);"
                        class="z-0"></div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Bin Cards Grid -->
            <div class="col-lg-8">
                <h5 class="fw-bold text-dark mb-4 px-2">Sensor Matrix</h5>

                <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">

                    
                    <!-- Determine initial theme -->
                    
                    
                    
                    
                    
                    

                    <div class="col">
                        <div id="card-Main Entrance"
                            class="card bin-card h-100 shadow-sm rounded-card shadow-hover theme-danger">
                            <div
                                class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                                <h6 class="mb-0 fw-bold text-dark">Main Entrance</h6>
                                <span id="status-Main Entrance"
                                    class="badge rounded-pill fw-medium theme-danger-badge px-2 py-1">Critical</span>
                            </div>

                            <div class="card-body text-center px-4 py-3">
                                <h1 id="text-Main Entrance" class="display-3 fw-bold text-value mb-0"
                                    style="letter-spacing: -0.05em;">100<span class="fs-4">%</span>
                                </h1>
                                <p class="text-muted small fw-medium mt-1 mb-4">Current Capacity</p>

                                <div class="bin-progress w-100 overflow-hidden">
                                    <div id="bar-Main Entrance" class="bin-progress-bar h-100 bar-fill"
                                        style="width: 100%"></div>
                                </div>
                            </div>

                            <div class="card-footer bg-transparent border-0 pb-4 px-4 pt-0 d-flex gap-2">
                                <a href="/history/Main Entrance"
                                    class="btn btn-light border flex-grow-1 btn-sm rounded-pill fw-medium text-muted hover-dark">
                                    <i class="bi bi-clock-history"></i> Logs
                                </a>
                                <form action="/delete_bin/Main Entrance" method="POST" class="m-0"
                                    onsubmit="return confirm('Remove unit Main Entrance from system?');">
                                    <button type="submit"
                                        class="btn btn-light border btn-sm text-danger rounded-pill px-3 hover-danger"
                                        title="Remove Bin">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Determine initial theme -->
                    
                    
                    

                    <div class="col">
                        <div id="card-MainblockBIN"
                            class="card bin-card h-100 shadow-sm rounded-card shadow-hover theme-success">
                            <div
                                class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                                <h6 class="mb-0 fw-bold text-dark">MainblockBIN</h6>
                                <span id="status-MainblockBIN"
                                    class="badge rounded-pill fw-medium theme-success-badge px-2 py-1">Normal</span>
                            </div>

                            <div class="card-body text-center px-4 py-3">
                                <h1 id="text-MainblockBIN" class="display-3 fw-bold text-value mb-0"
                                    style="letter-spacing: -0.05em;">45<span class="fs-4">%</span>
                                </h1>
                                <p class="text-muted small fw-medium mt-1 mb-4">Current Capacity</p>

                                <div class="bin-progress w-100 overflow-hidden">
                                    <div id="bar-MainblockBIN" class="bin-progress-bar h-100 bar-fill"
                                        style="width: 45%"></div>
                                </div>
                            </div>

                            <div class="card-footer bg-transparent border-0 pb-4 px-4 pt-0 d-flex gap-2">
                                <a href="/history/MainblockBIN"
                                    class="btn btn-light border flex-grow-1 btn-sm rounded-pill fw-medium text-muted hover-dark">
                                    <i class="bi bi-clock-history"></i> Logs
                                </a>
                                <form action="/delete_bin/MainblockBIN" method="POST" class="m-0"
                                    onsubmit="return confirm('Remove unit MainblockBIN from system?');">
                                    <button type="submit"
                                        class="btn btn-light border btn-sm text-danger rounded-pill px-3 hover-danger"
                                        title="Remove Bin">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                    

                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize Leaflet Map
        var map = L.map('map').setView([9.9312, 76.2673], 12);
        // Using Google Maps vibrant streets style
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            attribution: '&copy; Google Maps',
            maxZoom: 20
        }).addTo(map);

        var tempMarker = null;

        // Map Click to Set Coordinates
        map.on('click', function (e) {
            var lat = e.latlng.lat;
            var lon = e.latlng.lng;

            // Populate Input Fields
            document.querySelector('input[name="lat"]').value = lat.toFixed(6);
            document.querySelector('input[name="lon"]').value = lon.toFixed(6);

            // Add or move temporary marker
            if (tempMarker) {
                tempMarker.setLatLng(e.latlng);
            } else {
                tempMarker = L.marker(e.latlng).addTo(map).bindPopup("Deployment Location").openPopup();
            }
        });

        // Dictionaries to track markers so we can update them without recreating
        var binMarkers = {};
        var collectorMarkers = {};

        // Initial pass to render existing bins locally via template engine
        
        var color = "#F43F5E";
        var m = L.circleMarker([9.9928, { { bin.location_lon } }], {
            color: color, fillColor: color, fillOpacity: 0.9, radius: 7, weight: 2
        }).addTo(map).bindPopup("<div class='text-center p-1'><strong class='d-block mb-1'>Main Entrance</strong><span class='badge bg-light text-dark border'>100% Full</span></div>");
        binMarkers["Main Entrance"] = m;
        
        var color = "#10B981";
        var m = L.circleMarker([9.9932, { { bin.location_lon } }], {
            color: color, fillColor: color, fillOpacity: 0.9, radius: 7, weight: 2
        }).addTo(map).bindPopup("<div class='text-center p-1'><strong class='d-block mb-1'>MainblockBIN</strong><span class='badge bg-light text-dark border'>45% Full</span></div>");
        binMarkers["MainblockBIN"] = m;
        

        function calculateCriticalCount(binsData) {
            return binsData.filter(b => b.status === 'Critical').length;
        }

        // --- REAL-TIME DATA FETCHING ---
        function updateDashboard() {
            // Fetch Bins Data
            fetch('/api/get_all_bins')
                .then(res => res.json())
                .then(data => {
                    // Update Critical Stat
                    document.getElementById('critical-count').innerText = calculateCriticalCount(data);

                    data.forEach(bin => {
                        var themeClass = 'theme-success';
                        var badgeClass = 'theme-success-badge';
                        var mColor = '#10B981'; // emerald

                        if (bin.status === 'Critical') {
                            themeClass = 'theme-danger';
                            badgeClass = 'theme-danger-badge';
                            mColor = '#F43F5E'; // rose
                        } else if (bin.status === 'Warning') {
                            themeClass = 'theme-warning';
                            badgeClass = 'theme-warning-badge';
                            mColor = '#F59E0B'; // amber
                        }

                        // DOM Updates for DOM Elements
                        var card = document.getElementById('card-' + bin.bin_id);
                        if (card) {
                            card.className = `card bin-card h-100 shadow-sm rounded-card shadow-hover ${themeClass}`;
                        }

                        var badge = document.getElementById('status-' + bin.bin_id);
                        if (badge) {
                            badge.className = `badge rounded-pill fw-medium px-2 py-1 ${badgeClass}`;
                            badge.innerText = bin.status;
                        }

                        var text = document.getElementById('text-' + bin.bin_id);
                        if (text) {
                            text.innerHTML = `${bin.fill_level}<span class="fs-4">%</span>`;
                        }

                        var bar = document.getElementById('bar-' + bin.bin_id);
                        if (bar) {
                            bar.style.width = bin.fill_level + '%';
                        }

                        // Map Marker Updates
                        if (binMarkers[bin.bin_id]) {
                            binMarkers[bin.bin_id].setStyle({ color: mColor, fillColor: mColor });
                            binMarkers[bin.bin_id].setPopupContent(`<div class='text-center p-1'><strong class='d-block mb-1'>${bin.bin_id}</strong><span class='badge bg-light text-dark border'>${bin.fill_level}% Full</span></div>`);
                        }
                    });
                });

            // Fetch Collectors Data
            fetch('/api/get_collectors')
                .then(res => res.json())
                .then(data => {
                    // Update Collector Stat Count
                    document.getElementById('collector-count').innerText = data.length;

                    // Track active collectors in this cycle
                    var currentCollectors = new Set();

                    data.forEach(driver => {
                        if (driver.lat && driver.lon) {
                            currentCollectors.add(driver.name);

                            // FIX: Check if marker exists, if so update position, if not create
                            if (collectorMarkers[driver.name]) {
                                collectorMarkers[driver.name].setLatLng([driver.lat, driver.lon]);
                            } else {
                                var driverMarker = L.circleMarker([driver.lat, driver.lon], {
                                    color: 'white', fillColor: '#4F46E5', fillOpacity: 1, radius: 8, weight: 2
                                }).addTo(map).bindPopup(`<strong><i class='bi bi-truck text-primary me-1'></i> ${driver.name}</strong>`);
                                collectorMarkers[driver.name] = driverMarker;
                            }
                        }
                    });

                    // FIX: Remove markers for drivers who are no longer active
                    Object.keys(collectorMarkers).forEach(driverName => {
                        if (!currentCollectors.has(driverName)) {
                            map.removeLayer(collectorMarkers[driverName]);
                            delete collectorMarkers[driverName];
                        }
                    });
                });
        }

        // Set Critical / Collector counts on initial mount
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('critical-count').innerText = "1";
            updateDashboard(); // Run once immediately
        });

        setInterval(updateDashboard, 2000);
    </script>
</body>

</html>
